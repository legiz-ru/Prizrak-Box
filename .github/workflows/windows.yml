name: Build Windows App

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions: write-all
    strategy:
      matrix:
        arch: [amd64, arm64]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v5

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          cd src-go
          go mod tidy

      - name: Download Geo Files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
          VERSION: ${{ env.VERSION }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath `
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=$env:VERSION" `
            -o px.exe

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "amd64") {
            $arch = "x64"
          }
          npm dedupe
          npm prune
          npx electron-forge make --arch=$arch

      - name: Debug Output Structure
        shell: pwsh
        run: |
          Write-Host "=== Output directory structure ==="
          Get-ChildItem -Path out -Recurse | Select-Object FullName

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $electronArch = if ($arch -eq "amd64") { "x64" } else { $arch }

          # Find portable app directory and compress with new name
          $portableDir = Get-ChildItem -Path "out" -Directory | Where-Object { $_.Name -like "Pandora-Box*" } | Select-Object -First 1
          if ($portableDir) {
              Write-Host "Found portable directory: $($portableDir.FullName)"
              Compress-Archive -Path "$($portableDir.FullName)\*" -DestinationPath "windows-${arch}.zip"
          } else {
              Write-Error "Portable directory not found"
              exit 1
          }

          # Find and rename MSI package
          $msiFile = Get-ChildItem -Path "out\make\wix\$electronArch" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
              Write-Host "Found MSI file: $($msiFile.FullName)"
              Copy-Item -Path $msiFile.FullName -Destination "windows-${arch}.msi"
          } else {
              Write-Error "MSI file not found in out\make\wix\$electronArch"
              exit 1
          }

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ env.VERSION }}
          name: ${{ env.VERSION }}
          draft: false
          prerelease: true
          files: |
            windows-${{ matrix.arch }}.zip
            windows-${{ matrix.arch }}.msi
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}