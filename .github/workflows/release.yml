name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            src-go/go.sum
            src-service/go.sum

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          cd src-go
          go mod tidy

      - name: Download Geo Files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath `
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=$env:VERSION" `
            -o px.exe

      - name: Build px-service for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-service
          go mod download
          go build -ldflags "-s -w" -o px-service.exe .

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "amd64") {
            $arch = "x64"
          }
          npm dedupe
          npm prune
          npx electron-forge make --arch=$arch

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $electronArch = if ($arch -eq "amd64") { "x64" } else { $arch }
          
          # --- Portable Zip ---
          $portableDir = Get-ChildItem -Path "out" -Directory | Where-Object { $_.Name -like "Prizrak-Box*" } | Select-Object -First 1
          if ($portableDir) {
              Compress-Archive -Path "$($portableDir.FullName)\*" -DestinationPath "windows-${arch}.zip"
          } else {
              Write-Error "Portable directory not found"
              exit 1
          }
          
          # --- MSI Installer ---
          $msiFile = Get-ChildItem -Path "out\make\wix\$electronArch" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "windows-${arch}.msi"
          } else {
              Write-Error "MSI file not found in out\make\wix\$electronArch"
              exit 1
          }
          
          # --- Squirrel.Windows Assets (FIXED LOGIC) ---
          $squirrelDir = "out\make\squirrel.windows\$electronArch"
          
          # 1. Find the actual Setup.exe installer file
          $installerFile = Get-ChildItem -Path $squirrelDir -Filter "*Setup.exe" | Select-Object -First 1
          if ($installerFile) {
              Copy-Item -Path $installerFile.FullName -Destination "windows-${arch}-Setup.exe"
          } else {
              Write-Error "Squirrel.Windows installer (*Setup.exe) file not found in $squirrelDir. Ensure the Squirrel maker ran successfully."
              exit 1
          }
          
          # 2. Copy RELEASES file (required for Squirrel auto-update)
          Copy-Item -Path "$squirrelDir\RELEASES" -Destination "RELEASES" -Force
          
          # 3. Find the full nupkg file
          $nupkgFile = Get-ChildItem -Path $squirrelDir -Filter "*-full.nupkg" | Select-Object -First 1
          if ($nupkgFile) {
              Copy-Item -Path $nupkgFile.FullName -Destination "windows-${arch}-full.nupkg"
          } else {
              Write-Error "Squirrel.Windows NUPKG file (*-full.nupkg) not found in $squirrelDir."
              exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            windows-${{ matrix.arch }}.zip
            windows-${{ matrix.arch }}.msi
            windows-${{ matrix.arch }}-Setup.exe
            RELEASES
            windows-${{ matrix.arch }}-full.nupkg

  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Install packaging tools
        run: sudo apt-get update && sudo apt-get install -y libarchive-tools

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            src-go/go.sum
            src-service/go.sum

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Build px-service for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-service
          go mod download
          go build -ldflags "-s -w" -o px-service .

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Prepare Release Assets
        run: |
          arch="${{ matrix.arch }}"
          electron_arch="$arch"
          if [ "$arch" = "amd64" ]; then
            electron_arch="x64"
          fi
          find out/make/deb/$electron_arch -name "*.deb" -exec mv {} linux-${arch}.deb \;
          find out/make/rpm/$electron_arch -name "*.rpm" -exec mv {} linux-${arch}.rpm \;
          if [ -f "linux-${arch}.rpm" ]; then
            aur_root=$(mktemp -d)
            bsdtar -xf "linux-${arch}.rpm" -C "$aur_root"
            tar --zstd -cf "linux-${arch}-aur.tar.zst" -C "$aur_root" usr
            rm -rf "$aur_root"
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            linux-${{ matrix.arch }}.deb
            linux-${{ matrix.arch }}.rpm
            linux-${{ matrix.arch }}-aur.tar.zst

  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    env:
      TEAM_ID: ${{ secrets.TEAM_ID }}
      APPLE_ID: ${{ secrets.APPLE_ID }}
      APP_SPECIFIC_PASSWORD: ${{ secrets.APP_SPECIFIC_PASSWORD }}
      FORCE_CODE_SIGN: 'true'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'
          cache-dependency-path: |
            src-go/go.sum
            src-service/go.sum

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Configure Code Signing
        env:
          MACOS_CERTIFICATE: ${{ secrets.MACOS_CERTIFICATE }}
          MACOS_CERT_PASSWORD: ${{ secrets.MACOS_CERT_PASSWORD }}
        run: |
          set -euo pipefail
          KEYCHAIN="ci-signing.keychain-db"
          KEYCHAIN_PATH="$HOME/Library/Keychains/$KEYCHAIN"
          CERT_PATH="$(mktemp /tmp/cert-XXXXXXXX.p12)"
          security delete-keychain "$KEYCHAIN" >/dev/null 2>&1 || true
          if ! echo "$MACOS_CERTIFICATE" | base64 --decode > "$CERT_PATH" 2>/dev/null; then
            echo "$MACOS_CERTIFICATE" | base64 -d > "$CERT_PATH"
          fi
          security create-keychain -p "$MACOS_CERT_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings "$KEYCHAIN"
          security unlock-keychain -p "$MACOS_CERT_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -k "$KEYCHAIN_PATH" -P "$MACOS_CERT_PASSWORD" -A
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/"//g')
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$MACOS_CERT_PASSWORD" "$KEYCHAIN_PATH"
          rm "$CERT_PATH"
          identity=$(security find-identity -v -p codesigning "$KEYCHAIN" | head -n 1 | sed -E 's/^.*"(.+)"$/\1/')
          if [ -z "$identity" ]; then
            echo "No signing identity found in keychain" >&2
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$identity" >> "$GITHUB_ENV"
          echo "SIGNING_KEYCHAIN=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Build px-service for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-service
          go mod download
          go build -ldflags "-s -w" -o px-service .

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
            npm install electron@25
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Compress Executable
        run: |
          cd out/make
          zip -r ../../macos-${{ matrix.arch }}.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: macos-${{ matrix.arch }}.zip

  publish_aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: build_linux
    environment: aur

    steps:
      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate Checksums (AUR archives)
        id: checksums
        run: |
          amd64_tar="artifacts/linux-amd64/linux-amd64-aur.tar.zst"
          arm64_tar="artifacts/linux-arm64/linux-arm64-aur.tar.zst"
          if [ ! -f "$amd64_tar" ] || [ ! -f "$arm64_tar" ]; then
            echo "Missing linux-*-aur.tar.zst artifacts"; exit 1
          fi
          amd64_sum=$(sha256sum "$amd64_tar" | awk '{ print $1 }')
          arm64_sum=$(sha256sum "$arm64_tar" | awk '{ print $1 }')
          echo "amd64_sha256=$amd64_sum" >> $GITHUB_OUTPUT
          echo "arm64_sha256=$arm64_sum" >> $GITHUB_OUTPUT

      - name: Generate AUR files (.SRCINFO, PKGBUILD, prizrak-box.sh)
        run: |
          # --- version handling ---
          TAG="${GITHUB_REF_NAME}"               # e.g. v1.0.20-alpha3
          PKGVER_RAW="${TAG#v}"                    # 1.0.20-alpha2
          PKGVER="${PKGVER_RAW//-/_}"              # 1.0.20_alpha2 (AUR-compliant)

          # --- launcher script (from pandora template, renamed to prizrak-box) ---
          cat > prizrak-box.sh << 'EOSH'
          #!/bin/bash
          set -e
          _APPDIR="/usr/lib/@appname@"
          _RUNNAME="${_APPDIR}/@runname@"
          _OPTIONS="@options@"
          export PATH="${_APPDIR}:${PATH}"
          export LD_LIBRARY_PATH="${_APPDIR}/swiftshader:${_APPDIR}/lib:${LD_LIBRARY_PATH}"
          export ELECTRON_IS_DEV=0
          export ELECTRON_FORCE_IS_PACKAGED=true
          export ELECTRON_DISABLE_SECURITY_WARNINGS=true
          export NODE_ENV=production
          export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"
          _FLAGS_FILE="${XDG_CONFIG_HOME}/@appname@-flags.conf"
          declare -a flags
          if [[ -f "${_FLAGS_FILE}" ]]; then
              mapfile -t < "${_FLAGS_FILE}"
          fi
          for line in "${MAPFILE[@]}"; do
              if [[ ! "${line}" =~ ^[[:space:]]*#.* ]] && [[ -n "${line}" ]]; then
                  flags+=("${line}")
              fi
          done
          _WAYLAND_OPTION=false
          for arg in "$@"; do
              if [[ "${arg}" == "--wayland" ]]; then
                  _WAYLAND_OPTION=true
                  break
              fi
          done
          if [[ "${_WAYLAND_OPTION}" == true ]]; then
              echo "Forcing Wayland"
              flags+=("--enable-features=UseOzonePlatform,WaylandWindowDecorations,VaapiVideoDecodeLinuxGL" "--ozone-platform=wayland")
          fi
          cd "${_APPDIR}"
          if [[ "${EUID}" -ne 0 ]] || [[ "${ELECTRON_RUN_AS_NODE}" ]]; then
              exec electron@electronversion@ "${_RUNNAME}" "${_OPTIONS}" "${flags[@]}" "$@" || exit $?
          else
              exec electron@electronversion@ "${_RUNNAME}" "${_OPTIONS}" --no-sandbox "${flags[@]}" "$@" || exit $?
          fi
          EOSH
          chmod +x prizrak-box.sh

          ELEC_VER=36
          PKGNAME=prizrak-box-bin
          PKGNAME_BASE="${PKGNAME%-bin}"
          PKGREL=1
          LICENSE="GPL-3.0-only"
          URL="https://github.com/legiz-ru/prizrak-box"
          SH_SUM=$(sha256sum prizrak-box.sh | awk '{print $1}')

          # --- PKGBUILD ---
          cat > PKGBUILD <<EOF
          pkgname=${PKGNAME}
          _pkgname=Prizrak-Box
          pkgver=${PKGVER}
          _electronversion=${ELEC_VER}
          pkgrel=${PKGREL}
          pkgdesc="A Simple Mihomo GUI.(Prebuilt version.Use system-wide electron)"
          arch=('aarch64' 'x86_64')
          url="${URL}"
          license=('${LICENSE}')
          provides=("\${pkgname%-bin}")
          conflicts=("\${pkgname%-bin}")
          depends=("electron\${_electronversion}")
          makedepends=('asar')
          source=("prizrak-box.sh")
          source_aarch64=("\${_pkgname}-\${pkgver}-aarch64.tar.zst::\${url}/releases/download/${TAG}/linux-arm64-aur.tar.zst")
          source_x86_64=("\${_pkgname}-\${pkgver}-x86_64.tar.zst::\${url}/releases/download/${TAG}/linux-amd64-aur.tar.zst")
          sha256sums=('${SH_SUM}')
          sha256sums_aarch64=('${{ steps.checksums.outputs.arm64_sha256 }}')
          sha256sums_x86_64=('${{ steps.checksums.outputs.amd64_sha256 }}')

          _get_electron_version() {
            _elec_ver="\$(strings "\${srcdir}/usr/lib/\${_pkgname}/\${_pkgname}" | grep '^Chrome/[0-9.]* Electron/[0-9]' | cut -d'/' -f3 | cut -d'.' -f1)"
            echo -e "The electron version is: \\033[1;31m\${_elec_ver}\\033[0m"
          }

          prepare() {
            sed -i -e "
              s/@electronversion@/\${_electronversion}/g
              s/@appname@/\${pkgname%-bin}/g
              s/@runname@/app.asar/g
              s/@cfgdirname@/\${_pkgname}/g
              s/@options@/env ELECTRON_OZONE_PLATFORM_HINT=auto/g
            " "\${srcdir}/prizrak-box.sh"

            _get_electron_version

            sed -i -e "
              s/Exec=\${_pkgname}/Exec=\${pkgname%-bin}/g
              s/Icon=\${_pkgname}/Icon=\${pkgname%-bin}/g
            " "\${srcdir}/usr/share/applications/\${_pkgname}.desktop"

            asar e "\${srcdir}/usr/lib/\${_pkgname}/resources/app.asar" "\${srcdir}/app.asar.unpacked"
            find "\${srcdir}/app.asar.unpacked/.vite" -type f -exec sed -i "s/process.resourcesPath/'\/usr\/lib\/\${pkgname%-bin}'/g" {} +
            asar p "\${srcdir}/app.asar.unpacked" "\${srcdir}/app.asar"
          }

          package() {
            install -Dm755 "\${srcdir}/prizrak-box.sh" "\${pkgdir}/usr/bin/\${pkgname%-bin}"
            install -Dm644 "\${srcdir}/app.asar" -t "\${pkgdir}/usr/lib/\${pkgname%-bin}"
            install -Dm755 "\${srcdir}/usr/lib/\${_pkgname}/resources/px" -t "\${pkgdir}/usr/lib/\${pkgname%-bin}"
            install -Dm644 "\${srcdir}/usr/share/pixmaps/\${_pkgname}.png" "\${pkgdir}/usr/share/pixmaps/\${pkgname%-bin}.png"
            install -Dm644 "\${srcdir}/usr/share/applications/\${_pkgname}.desktop" "\${pkgdir}/usr/share/applications/\${pkgname%-bin}.desktop"
            install -Dm644 "\${srcdir}/usr/share/doc/\${_pkgname}/copyright" "\${pkgdir}/usr/share/licenses/\${pkgname}/LICENSE"
          }
          EOF

          # --- .SRCINFO ---
          cat > .SRCINFO <<EOF
          pkgbase = ${PKGNAME}
            pkgdesc = A Simple Mihomo GUI.(Prebuilt version.Use system-wide electron)
            pkgver = ${PKGVER}
            pkgrel = ${PKGREL}
            url = ${URL}
            arch = aarch64
            arch = x86_64
            license = ${LICENSE}
            makedepends = asar
            depends = electron${ELEC_VER}
            provides = ${PKGNAME_BASE}
            conflicts = ${PKGNAME_BASE}
            source = prizrak-box.sh
            sha256sums = ${SH_SUM}
            source_aarch64 = Prizrak-Box-${PKGVER}-aarch64.tar.zst::${URL}/releases/download/${TAG}/linux-arm64-aur.tar.zst
            sha256sums_aarch64 = ${{ steps.checksums.outputs.arm64_sha256 }}
            source_x86_64 = Prizrak-Box-${PKGVER}-x86_64.tar.zst::${URL}/releases/download/${TAG}/linux-amd64-aur.tar.zst
            sha256sums_x86_64 = ${{ steps.checksums.outputs.amd64_sha256 }}

          pkgname = ${PKGNAME}
          EOF

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.0
        with:
          pkgname: prizrak-box-bin
          pkgbuild: ./PKGBUILD
          assets: |
            prizrak-box.sh
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ github.ref_name }}"
          ssh_keyscan_types: rsa,ecdsa,ed25519
          force_push: "true"


  release:
    needs: [build_windows, build_linux, build_macos, publish_aur]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Tag Version
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Update GitHub Release
        id: update_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.VERSION;
            const fs = require('fs');
            const path = require('path');

            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = data;
              core.info(`Found release ID ${release.id} for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Release with tag '${tag}' not found. Please create a draft release first.`);
                return;
              }
              throw error;
            }

            const downloadLinks = [
              `### Downloads`,
              `* [Windows (amd64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.zip)`,
              `* [Windows (amd64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.msi)`,
              `* [Windows (amd64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64-Setup.exe)`,
              `* [Windows (arm64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.zip)`,
              `* [Windows (arm64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.msi)`,
              `* [Windows (arm64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64-Setup.exe)`,
              `* [Linux (amd64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.deb)`,
              `* [Linux (amd64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.rpm)`,
              `* [Linux (arm64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.deb)`,
              `* [Linux (arm64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.rpm)`,
              `* [Arch User Repository (AUR)](https://aur.archlinux.org/packages/prizrak-box-bin)`,
              `* [macOS (amd64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-amd64.zip)`,
              `* [macOS (arm64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-arm64.zip)`
            ].join('\n');

            const newBody = (release.body ? release.body + '\n\n' : '') + downloadLinks;

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            });
            core.info(`Successfully updated release body.`);
            
            const uploadedAssets = new Set(); // <--- Добавлено: хранилище для отслеживания имен загруженных файлов
            const artifactsDir = 'artifacts';
            const platformDirs = fs.readdirSync(artifactsDir);

            for (const platformDir of platformDirs) {
              const files = fs.readdirSync(path.join(artifactsDir, platformDir));
              for (const fileName of files) {
                
                // Пропускаем, если файл с таким именем уже загружен (например, RELEASES)
                if (uploadedAssets.has(fileName)) {
                    core.info(`Skipping duplicate asset: ${fileName}`);
                    continue; 
                }
                
                const filePath = path.join(artifactsDir, platformDir, fileName);
                core.info(`Uploading asset: ${fileName}`);
                await github.rest.repos.uploadReleaseAsset({
                  owner,
                  repo,
                  release_id: release.id,
                  name: fileName,
                  data: fs.readFileSync(filePath),
                });
                uploadedAssets.add(fileName); // <--- Добавлено: отмечаем файл как загруженный
              }
            }
            core.info('All assets uploaded successfully.');
