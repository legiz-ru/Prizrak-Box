name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          cd src-go
          go mod tidy

      - name: Download Geo Files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath `
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=$env:VERSION" `
            -o px.exe

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "amd64") {
            $arch = "x64"
          }
          npm dedupe
          npm prune
          npx electron-forge make --arch=$arch

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $electronArch = if ($arch -eq "amd64") { "x64" } else { $arch }
          
          $portableDir = Get-ChildItem -Path "out" -Directory | Where-Object { $_.Name -like "Prizrak-Box*" } | Select-Object -First 1
          if ($portableDir) {
              Compress-Archive -Path "$($portableDir.FullName)\*" -DestinationPath "windows-${arch}.zip"
          } else {
              Write-Error "Portable directory not found"
              exit 1
          }
          
          $msiFile = Get-ChildItem -Path "out\make\wix\$electronArch" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "windows-${arch}.msi"
          } else {
              Write-Error "MSI file not found in out\make\wix\$electronArch"
              exit 1
          }

          $squirrelDir = "out\make\squirrel.windows\$electronArch"
          $exeFile = Get-ChildItem -Path $squirrelDir -Filter "*.exe" | Where-Object { $_.Name -notlike "*Setup*" } | Select-Object -First 1
          if ($exeFile) {
              Copy-Item -Path $exeFile.FullName -Destination "windows-${arch}-Setup.exe"
              Copy-Item -Path "$squirrelDir\RELEASES" -Destination "RELEASES"
              $nupkgFile = Get-ChildItem -Path $squirrelDir -Filter "*-full.nupkg" | Select-Object -First 1
              if ($nupkgFile) {
                  Copy-Item -Path $nupkgFile.FullName -Destination "windows-${arch}-full.nupkg"
              }
          } else {
              Write-Error "Squirrel.Windows setup file not found in $squirrelDir"
              exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            windows-${{ matrix.arch }}.zip
            windows-${{ matrix.arch }}.msi
            windows-${{ matrix.arch }}-Setup.exe
            RELEASES
            windows-${{ matrix.arch }}-full.nupkg

  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Prepare Release Assets
        run: |
          arch="${{ matrix.arch }}"
          electron_arch="$arch"
          if [ "$arch" = "amd64" ]; then
            electron_arch="x64"
          fi
          find out/make/deb/$electron_arch -name "*.deb" -exec mv {} linux-${arch}.deb \;
          find out/make/rpm/$electron_arch -name "*.rpm" -exec mv {} linux-${arch}.rpm \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            linux-${{ matrix.arch }}.deb
            linux-${{ matrix.arch }}.rpm

  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Install Makers
        run: npm install --save-dev @electron-forge/maker-squirrel @electron-forge/maker-wix @electron-forge/maker-deb @electron-forge/maker-rpm @electron-forge/maker-zip

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
            npm install electron@25
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Compress Executable
        run: |
          cd out/make
          zip -r ../../macos-${{ matrix.arch }}.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: macos-${{ matrix.arch }}.zip

  publish_aur:
    name: Publish to AUR
    runs-on: ubuntu-latest
    needs: build_linux
    
    steps:
      - name: Get Tag Version
        id: get_version
        run: echo "VERSION_TAG=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Calculate Checksums
        id: checksums
        run: |
          amd64_sum=$(sha256sum artifacts/linux-amd64/linux-amd64.deb | awk '{ print $1 }')
          arm64_sum=$(sha256sum artifacts/linux-arm64/linux-arm64.deb | awk '{ print $1 }')
          echo "amd64_sha256=$amd64_sum" >> $GITHUB_OUTPUT
          echo "arm64_sha256=$arm64_sum" >> $GITHUB_OUTPUT
          
      - name: Generate PKGBUILD
        run: |
          cat <<EOF > PKGBUILD
          # Maintainer: ${{ secrets.AUR_USERNAME }} <${{ secrets.AUR_COMMIT_EMAIL }}>
          pkgname=prizrak-box-bin
          _pkgname=Prizrak-Box
          pkgver=$(echo ${{ env.VERSION_TAG }} | sed 's/^v//')
          pkgrel=1
          pkgdesc="A cross-platform GUI client for Prizrak."
          arch=('x86_64' 'aarch64')
          url="https://github.com/legiz-ru/prizrak-box"
          license=('MIT')
          provides=("\${_pkgname}")
          conflicts=("\${_pkgname}")
          source_x86_64=("${_pkgname}-linux-x64-\${pkgver}.deb::https://github.com/legiz-ru/prizrak-box/releases/download/${{ env.VERSION_TAG }}/linux-amd64.deb")
          source_aarch64=("${_pkgname}-linux-arm64-\${pkgver}.deb::https://github.com/legiz-ru/prizrak-box/releases/download/${{ env.VERSION_TAG }}/linux-arm64.deb")
          sha256sums_x86_64=('${{ steps.checksums.outputs.amd64_sha256 }}')
          sha256sums_aarch64=('${{ steps.checksums.outputs.arm64_sha256 }}')

          package() {
            cd "\${srcdir}"
            tar -xf data.tar.xz -C "\${pkgdir}/"
          }
          EOF

      - name: Publish to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v2.7.0
        with:
          pkgname: prizrak-box-bin
          pkgbuild: ./PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_COMMIT_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to version ${{ env.VERSION_TAG }}"
          force_push: "true"

  release:
    needs: [build_windows, build_linux, build_macos, publish_aur]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Tag Version
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Update GitHub Release
        id: update_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.VERSION;
            const fs = require('fs');
            const path = require('path');

            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = data;
              core.info(`Found release ID ${release.id} for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Release with tag '${tag}' not found. Please create a draft release first.`);
                return;
              }
              throw error;
            }

            const downloadLinks = [
              `### Downloads`,
              `* [Windows (amd64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.zip)`,
              `* [Windows (amd64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.msi)`,
              `* [Windows (amd64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64-Setup.exe)`,
              `* [Windows (arm64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.zip)`,
              `* [Windows (arm64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.msi)`,
              `* [Windows (arm64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64-Setup.exe)`,
              `* [Linux (amd64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.deb)`,
              `* [Linux (amd64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.rpm)`,
              `* [Linux (arm64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.deb)`,
              `* [Linux (arm64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.rpm)`,
              `* [macOS (amd64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-amd64.zip)`,
              `* [macOS (arm64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-arm64.zip)`
            ].join('\n');

            const newBody = (release.body ? release.body + '\n\n' : '') + downloadLinks;

            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            });
            core.info(`Successfully updated release body.`);
            
            const artifactsDir = 'artifacts';
            const platformDirs = fs.readdirSync(artifactsDir);

            for (const platformDir of platformDirs) {
              const files = fs.readdirSync(path.join(artifactsDir, platformDir));
              for (const fileName of files) {
                const filePath = path.join(artifactsDir, platformDir, fileName);
                core.info(`Uploading asset: ${fileName}`);
                await github.rest.repos.uploadReleaseAsset({
                  owner,
                  repo,
                  release_id: release.id,
                  name: fileName,
                  data: fs.readFileSync(filePath),
                });
              }
            }
            core.info('All assets uploaded successfully.');