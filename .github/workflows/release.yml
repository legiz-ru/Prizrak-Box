name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          cd src-go
          go mod tidy

      - name: Download Geo Files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath `
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=$env:VERSION" `
            -o px.exe

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "amd64") { $arch = "x64" }
          npm dedupe
          npm prune
          npx electron-forge make --arch=$arch

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $electronArch = if ($arch -eq "amd64") { "x64" } else { $arch }
          
          $portableDir = Get-ChildItem -Path "out" -Directory | Where-Object { $_.Name -like "Prizrak-Box*" } | Select-Object -First 1
          if ($portableDir) {
              Compress-Archive -Path "$($portableDir.FullName)\*" -DestinationPath "windows-${arch}.zip"
          } else {
              Write-Error "Portable directory not found"
              exit 1
          }
          
          $msiFile = Get-ChildItem -Path "out\make\wix\$electronArch" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "windows-${arch}.msi"
          } else {
              Write-Error "MSI file not found in out\make\wix\$electronArch"
              exit 1
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            windows-${{ matrix.arch }}.zip
            windows-${{ matrix.arch }}.msi

  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Ensure AppImage maker is present
        run: |
          npm ls @forkprince/electron-forge-maker-appimage >/dev/null 2>&1 || \
          npm i -D @forkprince/electron-forge-maker-appimage

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Install AppImage runtime deps
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2 || true

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then arch="x64"; fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Prepare Release Assets
        run: |
          arch="${{ matrix.arch }}"
          electron_arch="$arch"; if [ "$arch" = "amd64" ]; then electron_arch="x64"; fi
          # deb/rpm
          find out/make/deb/$electron_arch -name "*.deb" -exec mv {} linux-${arch}.deb \;
          find out/make/rpm/$electron_arch -name "*.rpm" -exec mv {} linux-${arch}.rpm \;
          # AppImage
          find out/make/appimage/$electron_arch -name "*.AppImage" -exec mv {} linux-${arch}.AppImage \;

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            linux-${{ matrix.arch }}.deb
            linux-${{ matrix.arch }}.rpm
            linux-${{ matrix.arch }}.AppImage

  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
            npm install electron@25
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Compress Executable
        run: |
          cd out/make
          zip -r ../../macos-${{ matrix.arch }}.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: macos-${{ matrix.arch }}.zip

  release:
    needs: [build_windows, build_linux, build_macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Tag Version
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Update GitHub Release
        id: update_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.VERSION;
            const fs = require('fs');
            const path = require('path');

            // 1. Get the release by tag
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = data;
              core.info(`Found release ID ${release.id} for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Release with tag '${tag}' not found. Please create a draft release first.`);
                return;
              }
              throw error;
            }

            // 2. Prepare download links
            const downloadLinks = [
              `### Downloads`,
              `* [Windows (amd64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.zip)`,
              `* [Windows (amd64, Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.msi)`,
              `* [Windows (arm64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.zip)`,
              `* [Windows (arm64, Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.msi)`,
              `* [Linux (amd64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.deb)`,
              `* [Linux (amd64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.rpm)`,
              `* [Linux (amd64, AppImage)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.AppImage)`,
              `* [Linux (arm64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.deb)`,
              `* [Linux (arm64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.rpm)`,
              `* [Linux (arm64, AppImage)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.AppImage)`,
              `* [macOS (amd64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-amd64.zip)`,
              `* [macOS (arm64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-arm64.zip)`
            ].join('\n');

            // 3. Append links to existing body
            const newBody = (release.body ? release.body + '\n\n' : '') + downloadLinks;

            // 4. Update the release body
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            });
            core.info(`Successfully updated release body.`);
            
            // 5. Upload assets
            const artifactsDir = 'artifacts';
            const platformDirs = fs.readdirSync(artifactsDir);

            for (const platformDir of platformDirs) {
              const files = fs.readdirSync(path.join(artifactsDir, platformDir));
              for (const fileName of files) {
                const filePath = path.join(artifactsDir, platformDir, fileName);
                core.info(`Uploading asset: ${fileName}`);
                await github.rest.repos.uploadReleaseAsset({
                  owner,
                  repo,
                  release_id: release.id,
                  name: fileName,
                  data: fs.readFileSync(filePath),
                });
              }
            }
            core.info('All assets uploaded successfully.');

  publish_aur:
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Get Tag Version (without v)
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_ENV

      - name: Write PKGBUILD template
        run: |
          mkdir -p packaging/aur
          cat > packaging/aur/PKGBUILD.in <<'EOF'
          pkgname=prizrak-box-bin
          pkgver=@VERSION@
          pkgrel=1
          pkgdesc="A simple desktop GUI client for mihomo"
          arch=('x86_64' 'aarch64')
          url="https://github.com/legiz-ru/prizrak-box"
          license=('GPL-3.0-only')
          depends=('fuse2')
          provides=('prizrak-box')
          conflicts=('prizrak-box')
          options=(!strip)

          source_x86_64=("https://github.com/legiz-ru/prizrak-box/releases/download/v${pkgver}/linux-amd64.AppImage")
          source_aarch64=("https://github.com/legiz-ru/prizrak-box/releases/download/v${pkgver}/linux-arm64.AppImage")

          sha256sums_x86_64=('SKIP')
          sha256sums_aarch64=('SKIP')

          package() {
            install -d "$pkgdir/opt/prizrak-box" "$pkgdir/usr/bin" "$pkgdir/usr/share/applications"

            local appimage=""
            if [[ "$CARCH" == "x86_64" ]]; then
              appimage="linux-amd64.AppImage"
            else
              appimage="linux-arm64.AppImage"
            fi

            install -m755 "$srcdir/$appimage" "$pkgdir/opt/prizrak-box/Prizrak-Box.AppImage"
            ln -s "/opt/prizrak-box/Prizrak-Box.AppImage" "$pkgdir/usr/bin/prizrak-box"

            cat > "$pkgdir/usr/share/applications/prizrak-box.desktop" <<'EOD'
          [Desktop Entry]
          Type=Application
          Name=Prizrak Box
          Exec=prizrak-box
          Terminal=false
          Categories=Network;Utility;
          EOD
          }
          EOF

      - name: Render PKGBUILD with version
        run: |
          mkdir -p packaging/aur/out
          sed -e "s/@VERSION@/${VERSION}/g" \
            packaging/aur/PKGBUILD.in > packaging/aur/out/PKGBUILD
          cat packaging/aur/out/PKGBUILD

      - name: Publish to AUR via KSXGitHub
        uses: KSXGitHub/github-actions-deploy-aur@v4
        with:
          pkgname: prizrak-box-bin
          pkgbuild: packaging/aur/out/PKGBUILD
          commit_message: "prizrak-box-bin ${VERSION}"
          ssh_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          force_push: false
          updpkgsums: true
        env:
          GIT_USERNAME: ${{ secrets.AUR_USERNAME }}
          GIT_EMAIL: ${{ secrets.AUR_COMMIT_EMAIL }}
