name: Release App

on:
  push:
    tags:
      - 'v*'

jobs:
  build_windows:
    runs-on: windows-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        shell: pwsh
        run: |
          cd src-go
          go mod tidy

      - name: Download Geo Files
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        shell: pwsh
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath `
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=$env:VERSION" `
            -o px.exe

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          if ($arch -eq "amd64") {
            $arch = "x64"
          }
          npm dedupe
          npm prune
          npx electron-forge make --arch=$arch

      - name: Prepare Release Assets
        shell: pwsh
        run: |
          $arch = "${{ matrix.arch }}"
          $electronArch = if ($arch -eq "amd64") { "x64" } else { $arch }
          
          $portableDir = Get-ChildItem -Path "out" -Directory | Where-Object { $_.Name -like "Prizrak-Box*" } | Select-Object -First 1
          if ($portableDir) {
              Compress-Archive -Path "$($portableDir.FullName)\*" -DestinationPath "windows-${arch}.zip"
          } else {
              Write-Error "Portable directory not found"
              exit 1
          }
          
          $msiFile = Get-ChildItem -Path "out\make\wix\$electronArch" -Filter "*.msi" | Select-Object -First 1
          if ($msiFile) {
              Copy-Item -Path $msiFile.FullName -Destination "windows-${arch}.msi"
          } else {
              Write-Error "MSI file not found in out\make\wix\$electronArch"
              exit 1
          }

          $squirrelDir = Join-Path "out\make\squirrel.windows" $electronArch
          if (Test-Path $squirrelDir) {
              $setupFile = Get-ChildItem -Path $squirrelDir -Filter "*Setup.exe" | Select-Object -First 1
              if ($setupFile) {
                  Copy-Item -Path $setupFile.FullName -Destination "windows-${arch}-setup.exe" -Force
              } else {
                  Write-Warning "Squirrel setup executable not found"
              }
          } else {
              Write-Warning "Squirrel output directory not found"
          }

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-${{ matrix.arch }}
          path: |
            windows-${{ matrix.arch }}.zip
            windows-${{ matrix.arch }}.msi
            windows-${{ matrix.arch }}-setup.exe

  build_linux:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Prepare Release Assets
        run: |
          arch="${{ matrix.arch }}"
          electron_arch="$arch"
          if [ "$arch" = "amd64" ]; then
            electron_arch="x64"
          fi
          find out/make/deb/$electron_arch -name "*.deb" -exec mv {} linux-${arch}.deb \;
          find out/make/rpm/$electron_arch -name "*.rpm" -exec mv {} linux-${arch}.rpm \;
          portable_dir=$(find out -maxdepth 1 -type d -name "Prizrak-Box-linux-${electron_arch}" -print -quit)
          if [ -n "$portable_dir" ]; then
            tar -C "$(dirname "$portable_dir")" -czf "linux-${arch}.tar.gz" "$(basename "$portable_dir")"
          else
            echo "Portable directory not found" >&2
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            linux-${{ matrix.arch }}.deb
            linux-${{ matrix.arch }}.rpm
            linux-${{ matrix.arch }}.tar.gz

  build_macos:
    runs-on: macos-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set Up Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 'latest'

      - name: Install Frontend Dependencies
        run: npm install

      - name: Set Up Go
        uses: actions/setup-go@v6
        with:
          go-version: '1.25'

      - name: Install Backend Dependencies
        run: |
          cd src-go
          go mod tidy

      - name: Get Latest Geo Data
        run: |
          wget -O src-go/internal/em/geoip.metadb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -O src-go/internal/em/GeoSite.dat https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -O src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb

      - name: Get Tag Version
        shell: bash
        run: |
          VERSION=$(git describe --tags --abbrev=0)
          echo "VERSION=$VERSION" >> $GITHUB_ENV

      - name: Build Backend for ${{ matrix.arch }}
        env:
          CGO_ENABLED: 0
          GOARCH: ${{ matrix.arch }}
        run: |
          cd src-go
          go build -tags=with_gvisor -trimpath \
            -ldflags "-s -w -X github.com/legiz-ru/prizrak-box/api.Version=${{ env.VERSION }}" \
            -o px

      - name: Sync VERSION to package.json
        run: node build/sync-version.js

      - name: Build Frontend for ${{ matrix.arch }}
        run: |
          arch="${{ matrix.arch }}"
          if [ "$arch" = "amd64" ]; then
            arch="x64"
            npm install electron@25
          fi
          npm dedupe
          npm prune
          npm run make -- --arch=$arch

      - name: Compress Executable
        run: |
          cd out/make
          zip -r ../../macos-${{ matrix.arch }}.zip .

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.arch }}
          path: macos-${{ matrix.arch }}.zip

  release:
    needs: [build_windows, build_linux, build_macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Get Tag Version
        id: get_version
        run: echo "VERSION=${{ github.ref_name }}" >> $GITHUB_ENV

      - name: Update GitHub Release
        id: update_release
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = process.env.VERSION;
            const fs = require('fs');
            const path = require('path');

            // 1. Get the release by tag
            let release;
            try {
              const { data } = await github.rest.repos.getReleaseByTag({ owner, repo, tag });
              release = data;
              core.info(`Found release ID ${release.id} for tag ${tag}.`);
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Release with tag '${tag}' not found. Please create a draft release first.`);
                return;
              }
              throw error;
            }

            // 2. Prepare download links
            const downloadLinks = [
              `### Downloads`,
              `* [Windows (amd64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.zip)`,
              `* [Windows (amd64, Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.msi)`,
              `* [Windows (amd64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64.msi)`,
              `* [Windows (amd64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-amd64-setup.exe)`,
              `* [Windows (arm64, Portable)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.zip)`,
              `* [Windows (arm64, Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.msi)`,
              `* [Windows (arm64, MSI Installer)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64.msi)`,
              `* [Windows (arm64, Setup)](https://github.com/${owner}/${repo}/releases/download/${tag}/windows-arm64-setup.exe)`,
              `* [Linux (amd64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.deb)`,
              `* [Linux (amd64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.rpm)`,
              `* [Linux (amd64, tar.gz)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-amd64.tar.gz)`,
              `* [Linux (arm64, deb)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.deb)`,
              `* [Linux (arm64, rpm)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.rpm)`,
              `* [Linux (arm64, tar.gz)](https://github.com/${owner}/${repo}/releases/download/${tag}/linux-arm64.tar.gz)`,
              `* [macOS (amd64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-amd64.zip)`,
              `* [macOS (arm64, zip)](https://github.com/${owner}/${repo}/releases/download/${tag}/macos-arm64.zip)`
            ].join('\n');

            // 3. Append links to existing body
            const newBody = (release.body ? release.body + '\n\n' : '') + downloadLinks;

            // 4. Update the release body (name and prerelease status are not changed)
            await github.rest.repos.updateRelease({
              owner,
              repo,
              release_id: release.id,
              body: newBody,
            });
            core.info(`Successfully updated release body.`);
            
            // 5. Upload assets
            const artifactsDir = 'artifacts';
            const platformDirs = fs.readdirSync(artifactsDir);

            for (const platformDir of platformDirs) {
              const files = fs.readdirSync(path.join(artifactsDir, platformDir));
              for (const fileName of files) {
                const filePath = path.join(artifactsDir, platformDir, fileName);
                core.info(`Uploading asset: ${fileName}`);
                await github.rest.repos.uploadReleaseAsset({
                  owner,
                  repo,
                  release_id: release.id,
                  name: fileName,
                  data: fs.readFileSync(filePath),
                });
              }
            }
            core.info('All assets uploaded successfully.');

  publish_aur:
    needs: release
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "${{ secrets.AUR_USERNAME }}"
          git config --global user.email "${{ secrets.AUR_COMMIT_EMAIL }}"

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}

      - name: Trust AUR host
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -t rsa aur.archlinux.org >> ~/.ssh/known_hosts

      - name: Generate PKGBUILD and .SRCINFO
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          pkgname="prizrak-box-bin"
          _pkgname="Prizrak-Box"
          tag="$TAG"
          version="${tag#v}"
          repo="${GITHUB_REPOSITORY}"
          workdir="aur-build"
          mkdir -p "$workdir"

          electron_major=$(python3 - <<'PY'
import json
import re
from pathlib import Path

data = json.loads(Path('package.json').read_text())
raw = data.get('devDependencies', {}).get('electron') or data.get('dependencies', {}).get('electron')
if not raw:
    raise SystemExit(1)
match = re.search(r'\d+', raw)
if not match:
    raise SystemExit(1)
print(match.group(0))
PY
)

          launcher_path="$workdir/${pkgname%-bin}.sh"
          {
            printf '%s\n' '#!/bin/bash' \
              'set -e' \
              '_APPDIR="/usr/lib/@appname@"' \
              '_RUNNAME="${_APPDIR}/@runname@"' \
              '_OPTIONS="@options@"' \
              'export PATH="${_APPDIR}:${PATH}"' \
              'export LD_LIBRARY_PATH="${_APPDIR}/swiftshader:${_APPDIR}/lib:${LD_LIBRARY_PATH}"' \
              'export ELECTRON_IS_DEV=0' \
              'export ELECTRON_FORCE_IS_PACKAGED=true' \
              'export ELECTRON_DISABLE_SECURITY_WARNINGS=true' \
              'export NODE_ENV=production' \
              'export XDG_CONFIG_HOME="${XDG_CONFIG_HOME:-$HOME/.config}"' \
              '_FLAGS_FILE="${XDG_CONFIG_HOME}/@appname@-flags.conf"' \
              'declare -a flags' \
              'if [[ -f "${_FLAGS_FILE}" ]]; then' \
              '    mapfile -t < "${_FLAGS_FILE}"' \
              'fi' \
              'for line in "${MAPFILE[@]}"; do' \
              '    if [[ ! "${line}" =~ ^[[:space:]]*#.* ]] && [[ -n "${line}" ]]; then' \
              '        flags+=("${line}")' \
              '    fi' \
              'done' \
              '_WAYLAND_OPTION=false' \
              'for arg in "$@"; do' \
              '    if [[ "${arg}" == "--wayland" ]]; then' \
              '        _WAYLAND_OPTION=true' \
              '        break' \
              '    fi' \
              'done' \
              'if [[ "${_WAYLAND_OPTION}" == true ]]; then' \
              '    echo "Forcing Wayland"' \
              '    flags+=("--enable-features=UseOzonePlatform,WaylandWindowDecorations,VaapiVideoDecodeLinuxGL" "--ozone-platform=wayland")' \
              'fi' \
              'cd "${_APPDIR}"' \
              'if [[ "${EUID}" -ne 0 ]] || [[ "${ELECTRON_RUN_AS_NODE}" ]]; then' \
              '    exec electron@electronversion@ "${_RUNNAME}" "${_OPTIONS}" "${flags[@]}" "$@" || exit $?' \
              'else' \
              '    exec electron@electronversion@ "${_RUNNAME}" "${_OPTIONS}" --no-sandbox "${flags[@]}" "$@" || exit $?' \
              'fi'
          } > "$launcher_path"

          chmod +x "$launcher_path"
          script_sha=$(sha256sum "$launcher_path" | awk '{print $1}')

          declare -A arch_map=( [amd64]=x86_64 [arm64]=aarch64 )
          declare -A sources
          declare -A shas

          for build_arch in "${!arch_map[@]}"; do
            aur_arch="${arch_map[$build_arch]}"
            asset_url="https://github.com/${repo}/releases/download/${tag}/linux-${build_arch}.rpm"
            dest_file="$workdir/${pkgname%-bin}-${version}-${aur_arch}.rpm"
            curl -L "$asset_url" -o "$dest_file"
            sha=$(sha256sum "$dest_file" | awk '{print $1}')
            sources[$aur_arch]="${pkgname%-bin}-${version}-${aur_arch}.rpm::${asset_url}"
            shas[$aur_arch]="$sha"
          done

          cat > "$workdir/PKGBUILD" <<PKG
pkgname=${pkgname}
_pkgname=${_pkgname}
pkgver=${version}
_electronversion=${electron_major}
pkgrel=1
pkgdesc="A Simple Mihomo GUI.(Prebuilt version.Use system-wide electron)"
arch=(
    'aarch64'
    'x86_64'
)
url="https://github.com/${repo}"
license=('GPL-3.0-only')
provides=("\${pkgname%-bin}")
conflicts=("\${pkgname%-bin}")
depends=(
    "electron\${_electronversion}"
)
makedepends=(
    'asar'
)
source=("\${pkgname%-bin}.sh")
source_aarch64=("${sources[aarch64]}")
source_x86_64=("${sources[x86_64]}")
sha256sums=('${script_sha}')
sha256sums_aarch64=('${shas[aarch64]}')
sha256sums_x86_64=('${shas[x86_64]}')
_get_electron_version() {
    _elec_ver="$(strings "${srcdir}/usr/lib/${_pkgname}/${_pkgname}" | grep '^Chrome/[0-9.]* Electron/[0-9]' | cut -d'/' -f3 | cut -d'.' -f1)"
    echo -e "The electron version is: \033[1;31m${_elec_ver}\033[0m"
}
prepare() {
    sed -i -e "
        s/@electronversion@/${_electronversion}/g
        s/@appname@/${pkgname%-bin}/g
        s/@runname@/app.asar/g
        s/@cfgdirname@/${_pkgname}/g
        s/@options@/env ELECTRON_OZONE_PLATFORM_HINT=auto/g
    " "${srcdir}/${pkgname%-bin}.sh"
    bsdtar -xf "${srcdir}/${_pkgname}-"*.rpm
    _get_electron_version
    sed -i -e "
        s/Exec=${_pkgname}/Exec=${pkgname%-bin}/g
        s/Icon=${_pkgname}/Icon=${pkgname%-bin}/g
    " "${srcdir}/usr/share/applications/${_pkgname}.desktop"
    asar e "${srcdir}/usr/lib/${_pkgname}/resources/app.asar" "${srcdir}/app.asar.unpacked"
    find "${srcdir}/app.asar.unpacked/.vite" -type f -exec sed -i "s/process.resourcesPath/'\/usr\/lib\/${pkgname%-bin}'/g" {} +
    asar p "${srcdir}/app.asar.unpacked" "${srcdir}/app.asar"
}
package() {
    install -Dm755 "${srcdir}/${pkgname%-bin}.sh" "${pkgdir}/usr/bin/${pkgname%-bin}"
    install -Dm644 "${srcdir}/app.asar" -t "${pkgdir}/usr/lib/${pkgname%-bin}"
    install -Dm755 "${srcdir}/usr/lib/${_pkgname}/resources/px" -t "${pkgdir}/usr/lib/${pkgname%-bin}"
    install -Dm644 "${srcdir}/usr/share/pixmaps/${_pkgname}.png" "${pkgdir}/usr/share/pixmaps/${pkgname%-bin}.png"
    install -Dm644 "${srcdir}/usr/share/applications/${_pkgname}.desktop" "${pkgdir}/usr/share/applications/${pkgname%-bin}.desktop"
    install -Dm644 "${srcdir}/usr/share/doc/${_pkgname}/copyright" "${pkgdir}/usr/share/licenses/${pkgname}/LICENSE"
}
PKG

          cat > "$workdir/.SRCINFO" <<SRCINFO
pkgbase = ${pkgname}
pkgdesc = A Simple Mihomo GUI.(Prebuilt version.Use system-wide electron)
pkgver = ${version}
pkgrel = 1
url = https://github.com/${repo}
arch = aarch64
arch = x86_64
license = GPL-3.0-only
makedepends = asar
depends = electron${electron_major}
provides = prizrak-box
conflicts = prizrak-box
source = ${pkgname%-bin}.sh
sha256sums = ${script_sha}
source_aarch64 = ${sources[aarch64]}
sha256sums_aarch64 = ${shas[aarch64]}
source_x86_64 = ${sources[x86_64]}
sha256sums_x86_64 = ${shas[x86_64]}

pkgname = ${pkgname}
provides = prizrak-box
conflicts = prizrak-box
SRCINFO

      - name: Clone AUR repository
        env:
          AUR_USERNAME: ${{ secrets.AUR_USERNAME }}
        run: |
          git clone ssh://aur@aur.archlinux.org/prizrak-box-bin.git aur-repo

      - name: Publish to AUR
        env:
          TAG: ${{ github.ref_name }}
        run: |
          set -euo pipefail
          version="${TAG#v}"
          cp aur-build/PKGBUILD aur-repo/PKGBUILD
          cp aur-build/.SRCINFO aur-repo/.SRCINFO
          cp aur-build/prizrak-box.sh aur-repo/prizrak-box.sh
          cd aur-repo
          if git status --porcelain | grep -q .; then
            git add PKGBUILD .SRCINFO prizrak-box.sh
            git commit -m "Update to version ${version}"
            git push
          else
            echo "AUR repository already up to date"
          fi