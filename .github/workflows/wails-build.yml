name: Build Wails (PoC)

# CI for the Wails v3 shell (src-wails), built in parallel with the Electron
# release workflow.
#
# - Geo/model data (src-go/internal/em/*) is refreshed at build time from the
#   same sources the Electron workflow uses, so builds are always up to date.
# - Linux / macOS produce UNSIGNED archives. Windows builds the SAME MSI
#   installer as the Electron build (installer/build-msi.js + installer/wix),
#   which installs/reinstalls the TUN service (selected by default, can be
#   opted out) and registers the prizrak-box:// protocol.

on:
  workflow_dispatch:
    inputs:
      build_linux:
        description: 'Build Linux'
        type: boolean
        default: true
      build_macos:
        description: 'Build macOS (arm64)'
        type: boolean
        default: true
      build_windows:
        description: 'Build Windows (amd64)'
        type: boolean
        default: true

jobs:
  linux:
    if: ${{ inputs.build_linux }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
      - name: Install WebKitGTK
        run: sudo apt-get update && sudo apt-get install -y libgtk-4-dev libwebkitgtk-6.0-dev
      - name: Refresh geo/model data
        run: |
          wget -qO src-go/internal/em/Model.bin       https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
          wget -qO src-go/internal/em/geoip.metadb     https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          wget -qO src-go/internal/em/GeoSite.dat       https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          wget -qO src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
      - name: Build frontend
        run: |
          npm install --no-audit --no-fund
          npx vite build --outDir src-wails/frontend/dist --emptyOutDir
      - name: Build px + px-service
        run: |
          (cd src-go && CGO_ENABLED=0 go build -tags=with_gvisor -trimpath -o px .)
          (cd src-service && CGO_ENABLED=0 go build -ldflags="-s -w" -o px-service .)
      - name: Build Wails app
        run: |
          cd src-wails
          CGO_ENABLED=1 go build -trimpath -o bin/prizrak-box-wails .
      - name: Stage bundle
        run: |
          cp src-go/px src-service/px-service src-wails/bin/
          tar -C src-wails/bin -czf prizrak-box-wails-linux-amd64.tar.gz .
      - uses: actions/upload-artifact@v4
        with:
          name: wails-linux-amd64
          path: prizrak-box-wails-linux-amd64.tar.gz

  macos:
    if: ${{ inputs.build_macos }}
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
      - name: Refresh geo/model data
        run: |
          curl -fsSL -o src-go/internal/em/Model.bin       https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin
          curl -fsSL -o src-go/internal/em/geoip.metadb     https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb
          curl -fsSL -o src-go/internal/em/GeoSite.dat       https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat
          curl -fsSL -o src-go/internal/em/GeoLite2-ASN.mmdb https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb
      - name: Build frontend
        run: |
          npm install --no-audit --no-fund
          npx vite build --outDir src-wails/frontend/dist --emptyOutDir
      - name: Build px + px-service (arm64)
        env:
          GOARCH: arm64
        run: |
          (cd src-go && CGO_ENABLED=0 go build -tags=with_gvisor -trimpath -o px .)
          (cd src-service && CGO_ENABLED=0 go build -ldflags="-s -w" -o px-service .)
      - name: Build Wails app (arm64)
        env:
          GOARCH: arm64
          CGO_ENABLED: '1'
        run: |
          cd src-wails
          go build -trimpath -o /tmp/prizrak-box-wails .
      - name: Assemble .app
        run: |
          APP="Prizrak-Box.app"
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp /tmp/prizrak-box-wails "$APP/Contents/MacOS/Prizrak-Box"
          # px + px-service ship next to the binary (locate.go finds them there)
          cp src-go/px src-service/px-service "$APP/Contents/MacOS/"
          chmod +x "$APP/Contents/MacOS/"*
          cp build/appicon.icns "$APP/Contents/Resources/appicon.icns" || true
          cp src-wails/build/darwin/Info.plist "$APP/Contents/Info.plist"
          zip -qr wails-macos-arm64.zip "$APP"
      - uses: actions/upload-artifact@v4
        with:
          name: wails-macos-arm64
          path: wails-macos-arm64.zip

  windows:
    if: ${{ inputs.build_windows }}
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          check-latest: true
      - name: Refresh geo/model data
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri https://github.com/vernesong/mihomo/releases/download/LightGBM-Model/Model.bin -OutFile src-go/internal/em/Model.bin
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geoip.metadb -OutFile src-go/internal/em/geoip.metadb
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/geosite.dat -OutFile src-go/internal/em/GeoSite.dat
          Invoke-WebRequest -Uri https://github.com/MetaCubeX/meta-rules-dat/releases/download/latest/GeoLite2-ASN.mmdb -OutFile src-go/internal/em/GeoLite2-ASN.mmdb
      - name: Build frontend
        run: |
          npm install --no-audit --no-fund
          npx vite build --outDir src-wails/frontend/dist --emptyOutDir
      - name: Build px + px-service
        shell: pwsh
        env:
          GOARCH: amd64
        run: |
          cd src-go;       $env:CGO_ENABLED='0'; go build -tags=with_gvisor -trimpath -o px.exe .; cd ..
          cd src-service;  $env:CGO_ENABLED='0'; go build -ldflags="-s -w" -o px-service.exe .;   cd ..
      - name: Build Wails app (Prizrak-Box.exe with icon)
        shell: pwsh
        env:
          GOARCH: amd64
          CGO_ENABLED: '0'
        run: |
          go install github.com/tc-hib/go-winres@latest
          cd src-wails
          # Embed the app icon + a standard GUI manifest into the exe.
          go-winres simply --icon ../build/appicon.ico --manifest gui --product-name "Prizrak-Box"
          go build -trimpath -o bin/Prizrak-Box.exe .
          Remove-Item rsrc_windows_*.syso -ErrorAction SilentlyContinue
      - name: Stage app (Electron MSI layout)
        shell: pwsh
        run: |
          $dir = "out/Prizrak-Box-win32-x64"
          New-Item -ItemType Directory -Force -Path "$dir/resources" | Out-Null
          Copy-Item src-wails/bin/Prizrak-Box.exe "$dir/Prizrak-Box.exe"
          Copy-Item src-go/px.exe                 "$dir/resources/px.exe"
          Copy-Item src-service/px-service.exe    "$dir/resources/px-service.exe"
      - name: Install WiX Toolset
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" -OutFile "wix.zip"
          Expand-Archive -Path "wix.zip" -DestinationPath "C:\wix" -Force
          "C:\wix" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Build MSI (reuses installer/build-msi.js — TUN service + protocol)
        shell: pwsh
        env:
          ARCH: x64
        run: |
          $env:PATH = "C:\wix;$env:PATH"
          node installer/build-msi.js
          Copy-Item out/msi/x64/windows-x64.msi prizrak-box-wails-windows-amd64.msi
      - name: Stage portable zip
        shell: pwsh
        run: Compress-Archive -Path out/Prizrak-Box-win32-x64/* -DestinationPath prizrak-box-wails-windows-amd64.zip -Force
      - uses: actions/upload-artifact@v4
        with:
          name: wails-windows-amd64
          path: |
            prizrak-box-wails-windows-amd64.msi
            prizrak-box-wails-windows-amd64.zip
