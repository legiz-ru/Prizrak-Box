version: "3"

# Taskfile for the Wails v3 shell (Phase 0 PoC).
#
# Prerequisites:
#   - wails3 CLI:  go install github.com/wailsapp/wails/v3/cmd/wails3@latest
#   - The px backend built at ../src-go/px  (see repo README "Build px backend")
#   - Frontend deps installed at the repo root:  npm install
#
# The frontend is the existing Vue app in the repo root (../). We build it
# straight into ./frontend/dist so that main.go can embed it.

vars:
  REPO_ROOT: "{{.TASKFILE_DIR}}/.."
  DIST: "{{.TASKFILE_DIR}}/frontend/dist"

tasks:
  frontend:
    desc: Build the Vue frontend into frontend/dist
    dir: "{{.REPO_ROOT}}"
    cmds:
      - npx vite build --outDir "{{.DIST}}" --emptyOutDir

  icons:
    desc: Regenerate .ico / tray.png from master appicon.png (sharp), and .icns for macOS
    dir: "{{.TASKFILE_DIR}}/build"
    cmds:
      - node gen-icons.mjs
      # macOS .icns is built from the padded master (darwin/appicon-macos.png),
      # which sits the artwork inside Apple's icon-grid safe area (~80.5% of the
      # canvas) so the Dock / Cmd+Tab icon matches the size of native apps instead
      # of filling the whole tile edge-to-edge. gen-icons.mjs regenerates it.
      - |
        SRC=darwin/appicon-macos.png
        ICONSET=$(mktemp -d /tmp/appicon.XXXXXX.iconset)
        sips -z 16   16   "$SRC" --out "$ICONSET/icon_16x16.png"       >/dev/null
        sips -z 32   32   "$SRC" --out "$ICONSET/icon_16x16@2x.png"    >/dev/null
        sips -z 32   32   "$SRC" --out "$ICONSET/icon_32x32.png"       >/dev/null
        sips -z 64   64   "$SRC" --out "$ICONSET/icon_32x32@2x.png"    >/dev/null
        sips -z 128  128  "$SRC" --out "$ICONSET/icon_128x128.png"     >/dev/null
        sips -z 256  256  "$SRC" --out "$ICONSET/icon_128x128@2x.png"  >/dev/null
        sips -z 256  256  "$SRC" --out "$ICONSET/icon_256x256.png"     >/dev/null
        sips -z 512  512  "$SRC" --out "$ICONSET/icon_256x256@2x.png"  >/dev/null
        sips -z 512  512  "$SRC" --out "$ICONSET/icon_512x512.png"     >/dev/null
        sips -z 1024 1024 "$SRC" --out "$ICONSET/icon_512x512@2x.png"  >/dev/null
        iconutil --convert icns "$ICONSET" --output darwin/appicon.icns
        rm -rf "$ICONSET"
        echo "Generated darwin/appicon.icns"

  px:
    desc: Build the px backend (CGO disabled, gvisor TUN)
    dir: "{{.REPO_ROOT}}/src-go"
    cmds:
      - CGO_ENABLED=0 go build -tags=with_gvisor -trimpath -o px .

  build:
    desc: Build the full desktop app (frontend + Go shell) with wails3
    deps: [frontend]
    cmds:
      - wails3 build

  dev:
    desc: Run the app in dev mode (Vite dev server + live Go)
    cmds:
      - wails3 dev

  package:
    desc: Produce platform installers
    deps: [frontend]
    cmds:
      - wails3 package

  bundle:
    desc: Wrap the built binary into a signed .app bundle (macOS only)
    cmds:
      - mkdir -p bin/Prizrak-Box.app/Contents/{MacOS,Resources}
      - cp build/darwin/appicon.icns bin/Prizrak-Box.app/Contents/Resources/
      - cp bin/Prizrak-Box bin/Prizrak-Box.app/Contents/MacOS/
      - cp build/darwin/Info.plist bin/Prizrak-Box.app/Contents/
      - codesign --force --deep --sign - bin/Prizrak-Box.app

  clean:
    cmds:
      - rm -rf "{{.DIST}}" ./bin
